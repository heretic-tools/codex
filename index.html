<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HereticSheets</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">HS</span>
          <div>
            <h1>HereticSheets</h1>
            <p id="sourceMeta">Loading codex data...</p>
          </div>
        </div>
        <div class="topbar-actions">
          <div class="view-switch" aria-label="View mode">
            <button class="view-mode is-active" type="button" data-view-mode="datasheets">Datasheets</button>
            <button class="view-mode" type="button" data-view-mode="armory">Armory</button>
          </div>
          <label class="topbar-select">
            <span>Faction</span>
            <select id="factionSelect"></select>
          </label>
          <button id="collapseAll" class="icon-button" type="button" title="Collapse all sections" aria-label="Collapse all sections">
            <span aria-hidden="true">-</span>
          </button>
          <button id="expandAll" class="icon-button" type="button" title="Expand all sections" aria-label="Expand all sections">
            <span aria-hidden="true">+</span>
          </button>
        </div>
      </header>

      <main class="workspace">
        <aside class="unit-browser" aria-label="Datasheet browser">
          <div class="search-row">
            <input id="searchInput" type="search" placeholder="Search datasheets, weapons, rules" autocomplete="off" />
          </div>
          <div class="filter-grid">
            <label>
              Category
              <select id="categoryFilter"></select>
            </label>
            <label>
              Keyword
              <select id="keywordFilter"></select>
            </label>
            <label>
              Sort
              <select id="sortMode">
                <option value="codex">Codex order</option>
                <option value="name">Name</option>
                <option value="points">Points</option>
                <option value="wounds">Wounds</option>
                <option value="complexity">Complexity</option>
              </select>
            </label>
          </div>
          <div id="quickFilters" class="quick-filters"></div>
          <div class="browser-summary">
            <span id="resultCount">0 datasheets</span>
          </div>
          <div id="unitList" class="unit-list"></div>
        </aside>

        <section class="sheet-stage" aria-label="Datasheet details">
          <article id="sheetDetail" class="sheet-detail"></article>
        </section>
      </main>
    </div>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
